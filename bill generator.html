<!DOCTYPE html>
<html>
<head>
<title>Grocery Bill Generator</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f8;
    padding:30px;
}
.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
h1{text-align:center}

.item{
    display:flex;
    justify-content:space-between;
    padding:10px;
    border-bottom:1px solid #ddd;
}

.qtyBox{
    width:60px;
    display:none;
}

button{
    margin-top:20px;
    padding:12px 20px;
    background:#28a745;
    color:white;
    border:none;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

.printBtn{
    background:#007bff;
    margin-left:10px;
}

.bill{
    margin-top:25px;
    background:#f8f9fa;
    padding:20px;
    border-radius:10px;
    display:none;
}

/* PRINT STYLING */
@media print{
    body *{
        visibility:hidden;
    }
    #billBox, #billBox *{
        visibility:visible;
    }
    #billBox{
        position:absolute;
        left:0;
        top:0;
        width:100%;
    }
}
</style>
</head>

<body>

<div class="container">
<h1>🛒 Grocery Bill Generator</h1>

<h3>Select Items</h3>

<div class="item">
<label><input type="checkbox" onchange="toggleQty('rice')"> Rice (₹60/kg)</label>
<input type="number" id="rice" class="qtyBox" min="1" placeholder="Qty">
</div>

<div class="item">
<label><input type="checkbox" onchange="toggleQty('milk')"> Milk (₹25)</label>
<input type="number" id="milk" class="qtyBox" min="1" placeholder="Qty">
</div>

<div class="item">
<label><input type="checkbox" onchange="toggleQty('bread')"> Bread (₹40)</label>
<input type="number" id="bread" class="qtyBox" min="1" placeholder="Qty">
</div>

<div class="item">
<label><input type="checkbox" onchange="toggleQty('eggs')"> Eggs (₹7)</label>
<input type="number" id="eggs" class="qtyBox" min="1" placeholder="Qty">
</div>

<div class="item">
<label><input type="checkbox" onchange="toggleQty('apples')"> Apples (₹120/kg)</label>
<input type="number" id="apples" class="qtyBox" min="1" placeholder="Qty">
</div>

<div class="item">
<label><input type="checkbox" onchange="toggleQty('sugar')"> Sugar (₹45/kg)</label>
<input type="number" id="sugar" class="qtyBox" min="1" placeholder="Qty">
</div>

<div class="item">
<label><input type="checkbox" onchange="toggleQty('oil')"> Oil (₹150/L)</label>
<input type="number" id="oil" class="qtyBox" min="1" placeholder="Qty">
</div>

<button onclick="generateBill()">Generate Bill</button>
<button class="printBtn" onclick="printBill()">🖨️ Print Bill</button>

<div class="bill" id="billBox">
    <h2>SuperMart Grocery Receipt</h2>
    <div id="billContent"></div>
</div>

</div>

<script>

const prices = {
    rice:60, milk:25, bread:40,
    eggs:7, apples:120, sugar:45, oil:150
};

function toggleQty(id){
    let box = document.getElementById(id);
    box.style.display = box.style.display === "inline-block" ? "none" : "inline-block";
}

function getQty(id){
    let el = document.getElementById(id);
    if(el.style.display === "none") return 0;
    return parseInt(el.value) || 0;
}

function generateBill(){

    let items = [
        ["Rice", getQty("rice"), prices.rice],
        ["Milk", getQty("milk"), prices.milk],
        ["Bread", getQty("bread"), prices.bread],
        ["Eggs", getQty("eggs"), prices.eggs],
        ["Apples", getQty("apples"), prices.apples],
        ["Sugar", getQty("sugar"), prices.sugar],
        ["Oil", getQty("oil"), prices.oil]
    ];

    let subtotal = 0;
    let bill = "<table border='1' width='100%' cellpadding='8'><tr><th>Item</th><th>Qty</th><th>Total ₹</th></tr>";

    items.forEach(item=>{
        if(item[1] > 0){
            let total = item[1] * item[2];
            subtotal += total;
            bill += `<tr><td>${item[0]}</td><td>${item[1]}</td><td>${total}</td></tr>`;
        }
    });

    let tax = subtotal * 0.05;
    let grandTotal = subtotal + tax;

    bill += `</table><br>
             Subtotal: ₹${subtotal.toFixed(2)}<br>
             GST (5%): ₹${tax.toFixed(2)}<br>
             <h2>Total: ₹${grandTotal.toFixed(2)}</h2>`;

    document.getElementById("billContent").innerHTML = bill;
    document.getElementById("billBox").style.display="block";
}

function printBill(){
    window.print();
}

</script>

</body>
</html>
